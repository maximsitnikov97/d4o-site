<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1210"/>
      <stop offset="100%" stop-color="#0F1A14"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e22"/>
      <stop offset="100%" stop-color="#0F1A14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#22C55E" stroke-opacity="0.12" rx="0"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#22C55E" stroke-opacity="0.05"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#22C55E" stroke-opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#22C55E" stroke-opacity="0.05"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#22C55E" stroke-opacity="0.05"/>

  <!-- D4O Badge -->
  <rect x="60" y="52" width="76" height="28" rx="6" fill="#22C55E" fill-opacity="0.15" stroke="#22C55E" stroke-opacity="0.4"/>
  <text x="98" y="71" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#22C55E">D4O</text>

  <!-- Category badge -->
  <rect x="152" y="52" width="110" height="28" rx="6" fill="#1a2e22" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="207" y="71" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#86EFAC">Telegram</text>

  <!-- Main Title -->
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#F0FDF4">Сколько стоит разработка</text>
  <text x="600" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#22C55E">Telegram бота</text>
  <text x="600" y="336" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#F0FDF4" opacity="0.85">в 2026 году</text>

  <!-- Accent line -->
  <rect x="480" y="356" width="240" height="3" rx="2" fill="url(#green-grad)"/>

  <!-- Price cards -->
  <!-- Card 1 -->
  <rect x="80" y="420" width="300" height="150" rx="16" fill="url(#card-grad)" stroke="#22C55E" stroke-opacity="0.2"/>
  <text x="230" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#86EFAC" letter-spacing="1">ПРОСТОЙ БОТ</text>
  <text x="230" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#4ADE80">15–80 тыс. ₽</text>
  <text x="230" y="545" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6EE7A0" opacity="0.7">1–3 недели</text>

  <!-- Card 2 -->
  <rect x="450" y="420" width="300" height="150" rx="16" fill="url(#card-grad)" stroke="#22C55E" stroke-opacity="0.3"/>
  <rect x="450" y="420" width="300" height="150" rx="16" fill="#22C55E" fill-opacity="0.04"/>
  <text x="600" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#86EFAC" letter-spacing="1">С ИНТЕГРАЦИЯМИ</text>
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="#22C55E">80–400 тыс. ₽</text>
  <text x="600" y="545" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6EE7A0" opacity="0.7">4–8 недель</text>

  <!-- Card 3 -->
  <rect x="820" y="420" width="300" height="150" rx="16" fill="url(#card-grad)" stroke="#22C55E" stroke-opacity="0.2"/>
  <text x="970" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#86EFAC" letter-spacing="1">MINI-APP</text>
  <text x="970" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#4ADE80">200 тыс. – 1,5 млн</text>
  <text x="970" y="545" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6EE7A0" opacity="0.7">4–12 недель</text>

  <!-- Footer -->
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22C55E" opacity="0.5">d4o.tech</text>
</svg>
