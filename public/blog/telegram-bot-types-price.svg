<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1210"/>
      <stop offset="100%" stop-color="#0F1A14"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e22"/>
      <stop offset="100%" stop-color="#0e1810"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f3326"/>
      <stop offset="100%" stop-color="#122016"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e22"/>
      <stop offset="100%" stop-color="#0e1810"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg)" rx="20"/>
  <rect x="1" y="1" width="1198" height="518" fill="none" stroke="#22C55E" stroke-opacity="0.12" rx="20"/>

  <!-- Title -->
  <text x="600" y="54" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#F0FDF4">Типы Telegram ботов и стоимость разработки</text>
  <line x1="360" y1="68" x2="840" y2="68" stroke="#22C55E" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Card 1: Simple bot -->
  <rect x="50" y="100" width="330" height="370" rx="18" fill="url(#card1)" stroke="#22C55E" stroke-opacity="0.2"/>
  <!-- Icon circle -->
  <circle cx="215" cy="158" r="36" fill="#22C55E" fill-opacity="0.1" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="215" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28">🤖</text>
  <text x="215" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#F0FDF4">Простой бот</text>
  <!-- Price -->
  <rect x="90" y="240" width="250" height="44" rx="10" fill="#22C55E" fill-opacity="0.12"/>
  <text x="215" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#4ADE80">15 – 80 тыс. ₽</text>
  <!-- Time -->
  <text x="215" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#86EFAC" opacity="0.8">⏱ 1–3 недели</text>
  <!-- Features -->
  <text x="80" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Команды и ответы</text>
  <text x="80" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Приём заявок</text>
  <text x="80" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Рассылка уведомлений</text>
  <text x="80" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Запись в CRM / таблицу</text>
  <text x="80" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• FAQ и поддержка</text>

  <!-- Card 2: With integrations (highlighted) -->
  <rect x="435" y="90" width="330" height="390" rx="18" fill="url(#card2)" stroke="#22C55E" stroke-opacity="0.5"/>
  <rect x="435" y="90" width="330" height="390" rx="18" fill="#22C55E" fill-opacity="0.03"/>
  <!-- Popular badge -->
  <rect x="530" y="80" width="140" height="26" rx="13" fill="#22C55E"/>
  <text x="600" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#0A1210">ПОПУЛЯРНЫЙ</text>
  <!-- Icon circle -->
  <circle cx="600" cy="160" r="36" fill="#22C55E" fill-opacity="0.18" stroke="#22C55E" stroke-opacity="0.5"/>
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28">⚡</text>
  <text x="600" y="224" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#F0FDF4">Бот с интеграциями</text>
  <!-- Price -->
  <rect x="470" y="242" width="260" height="44" rx="10" fill="#22C55E" fill-opacity="0.18"/>
  <text x="600" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#22C55E">80 – 400 тыс. ₽</text>
  <!-- Time -->
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#86EFAC" opacity="0.8">⏱ 4–8 недель</text>
  <!-- Features -->
  <text x="464" y="346" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Оплата (ЮKassa, Stripe)</text>
  <text x="464" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Личный кабинет</text>
  <text x="464" y="394" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Интеграция с CRM / 1C</text>
  <text x="464" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• История заказов</text>
  <text x="464" y="442" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Аналитика</text>

  <!-- Card 3: Mini-App -->
  <rect x="820" y="100" width="330" height="370" rx="18" fill="url(#card3)" stroke="#22C55E" stroke-opacity="0.2"/>
  <circle cx="985" cy="158" r="36" fill="#22C55E" fill-opacity="0.1" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="985" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28">🚀</text>
  <text x="985" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#F0FDF4">Telegram Mini-App</text>
  <!-- Price -->
  <rect x="840" y="240" width="290" height="44" rx="10" fill="#22C55E" fill-opacity="0.12"/>
  <text x="985" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#4ADE80">200 тыс. – 1,5 млн</text>
  <!-- Time -->
  <text x="985" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#86EFAC" opacity="0.8">⏱ 4–12 недель</text>
  <!-- Features -->
  <text x="850" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Полный UI / магазин</text>
  <text x="850" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Программа лояльности</text>
  <text x="850" y="392" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Реферальная система</text>
  <text x="850" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Геймификация</text>
  <text x="850" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D1FAE5" opacity="0.75">• Масштабируемость</text>

  <!-- D4O badge -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#22C55E" opacity="0.4">d4o.tech</text>
</svg>
